<script>

function toggleMusic(){

const audio =
document.getElementById("audio");

const botao =
document.getElementById("musicBtn");

if(audio.paused){

audio.play();

botao.innerHTML =
"⏸ Pausar Louvor";

}else{

audio.pause();

botao.innerHTML =
"▶ Ouvir Louvor";

}

}

function enviarPedido(){

const nome =
document.getElementById("nome").value;

const pedido =
document.getElementById("pedido").value;

if(nome.trim()==="" || pedido.trim()===""){

alert("Preencha seu nome e o pedido de oração.");

return;

}

const mensagem =
`🙏 PEDIDO DE ORAÇÃO

Nome: ${nome}

Pedido:

${pedido}`;

window.open(

`https://wa.me/556496078723?text=${encodeURIComponent(mensagem)}`,

"_blank"

);

}

const dataCulto = new Date();

dataCulto.setDate(dataCulto.getDate()+7);

function atualizarContador(){

const agora = new Date();

const diferenca = dataCulto - agora;

if(diferenca <= 0){

document.getElementById("contador").innerHTML =
"Hoje é dia de culto!";

return;

}

const dias =
Math.floor(diferenca / 1000 / 60 / 60 / 24);

const horas =
Math.floor((diferenca / 1000 / 60 / 60) % 24);

const minutos =
Math.floor((diferenca / 1000 / 60) % 60);

document.getElementById("contador").innerHTML =

"⏳ Próximo culto especial em " +

dias +

" dias, " +

horas +

" horas e " +

minutos +

" minutos.";

}

setInterval(atualizarContador,1000);

atualizarContador();

const cards = document.querySelectorAll(".card");

const observer = new IntersectionObserver((entries)=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.style.opacity="1";

entry.target.style.transform="translateY(0)";

}

});

});
cards.forEach((card)=>{

card.style.opacity="0";

card.style.transform="translateY(50px)";

card.style.transition="all .8s ease";

observer.observe(card);

});

window.addEventListener("scroll",()=>{

const nav = document.querySelector("nav");

if(window.scrollY > 80){

nav.style.background="#000";

nav.style.boxShadow="0 5px 20px rgba(0,0,0,.5)";

}else{

nav.style.background="#111";

nav.style.boxShadow="0 3px 15px rgba(0,0,0,.5)";

}

});

</script>
