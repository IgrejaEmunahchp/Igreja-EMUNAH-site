<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Igreja EMUNAH</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE ELITE
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#0b0b0b;
color:#fff;
}

/* =========================
   HERO
========================= */

.hero{
height:100vh;
background:url('IMG-20260319-WA0002 (1).jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.75);
}

.hero-content{
position:relative;
z-index:2;
max-width:800px;
padding:20px;
}

.hero h1{
font-size:clamp(32px,6vw,70px);
color:gold;
}

.hero p{
color:#ddd;
margin-top:10px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:gold;
color:#000;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

/* =========================
   MENU
========================= */

nav{
position:sticky;
top:0;
background:#111;
text-align:center;
padding:12px;
z-index:999;
}

nav a{
color:#fff;
margin:0 10px;
text-decoration:none;
font-size:14px;
}

/* =========================
   SEÇÕES
========================= */

.section{
padding:60px 20px;
max-width:1100px;
margin:auto;
}

h2{
text-align:center;
color:gold;
margin-bottom:25px;
}

/* =========================
   GLASS
========================= */

.glass{
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
padding:25px;
border-radius:15px;
border:1px solid rgba(255,215,0,.2);
}

/* =========================
   GRID
========================= */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

/* =========================
   CARD ELITE (IMAGEM COMPLETA)
========================= */

.card{
background:#181818;
border-radius:15px;
overflow:hidden;
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.card:hover{
transform:translateY(-5px);
}

/* 🔥 AQUI ESTÁ A CORREÇÃO */
.card img{
  width: 100%;
  aspect-ratio: 3 / 4;   /* formato retrato */
  object-fit: contain;   /* ou cover se quiser preencher */
  background: #000;
  display: block;
}

.card p{
padding:15px;
text-align:center;
}

/* =========================
   FORM
========================= */

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #333;
background:#1a1a1a;
color:#fff;
}

button{
width:100%;
margin-top:10px;
padding:12px;
background:gold;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* =========================
   FOOTER
========================= */

footer{
text-align:center;
padding:30px;
background:#111;
margin-top:40px;
}

/* =========================
   ANIMAÇÃO
========================= */

.reveal{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<header class="hero">
<div class="hero-content">
<h1>Igreja EMUNAH</h1>
<p>Um lugar de fé, esperança e transformação</p>
<a href="#cultos" class="btn">Ver Programação</a>
</div>
</header>

<nav>
<a href="#sobre">Sobre</a>
<a href="#cultos">Cultos</a>
<a href="#oracao">Oração</a>
</nav>

<section id="sobre" class="section reveal">
<h2>Sobre a Igreja</h2>
<div class="glass">
A Igreja EMUNAH é um lugar de acolhimento, fé e transformação espiritual.
</div>
</section>

<section id="cultos" class="section reveal">
<h2>Programação</h2>

<div class="grid">

<div class="card">
<img src="img/culto1.jpg">
<p>Terça - 20h</p>
</div>

<div class="card">
<img src="img/culto2.jpg">
<p>Quarta - 20h</p>
</div>

<div class="card">
<img src="IMG-20260630-WA0121.jpg">
<p>Quinta</p>
</div>

</div>
</section>

<section id="oracao" class="section reveal">
<h2>Pedido de Oração</h2>

<input id="nome" placeholder="Nome">
<textarea id="msg" placeholder="Pedido"></textarea>

<button onclick="enviar()">Enviar WhatsApp</button>
</section>

<footer>
© Igreja EMUNAH
</footer>

<script>
function enviar(){
let n=document.getElementById("nome").value;
let m=document.getElementById("msg").value;

if(!n||!m){
alert("Preencha tudo");
return;
}

window.open(
"https://wa.me/556496078723?text=" +
encodeURIComponent("🙏 Pedido de oração\nNome: "+n+"\n\n"+m)
);
}

window.addEventListener("scroll",()=>{
document.querySelectorAll(".reveal").forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight - 100){
el.classList.add("active");
}
});
});
</script>

</body>
  </html>
